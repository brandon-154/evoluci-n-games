<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard — Evolution Games B&R</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div id="app-loader"><div class="loader-spinner"></div><p>Cargando...</p></div>
<canvas id="pts"></canvas>
<div class="gbg"></div>

<nav>
  <div class="nlogo"><i class="fas fa-gamepad"></i><span>Evolution Games B&amp;R</span></div>
  <div class="nr">
    <span class="badm"><i class="fas fa-crown"></i> Admin</span>
    <button class="dark-toggle" title="Modo oscuro"><i class="fas fa-moon"></i></button>
    <button class="nbtn" id="btn-login-nav" onclick="oMod('m-login')"><i class="fas fa-crown"></i> Admin</button>
    <button class="nbtn dn" id="btn-logout"><i class="fas fa-sign-out-alt"></i> Salir</button>
  </div>
</nav>
<div id="toast"><i class="fas fa-check-circle"></i><span id="tmsg"></span></div>

<div class="ip">
  <div class="ihdr">
    <div class="bc">
      <a href="../index.html" class="bcl" style="text-decoration:none"><i class="fas fa-home"></i> Inicio</a>
      <i class="fas fa-chevron-right" style="font-size:.52rem"></i>
      <a href="puesto.html" class="bcl" style="text-decoration:none">Puesto</a>
      <i class="fas fa-chevron-right" style="font-size:.52rem"></i>
      <span>Dashboard</span>
    </div>
    <h1 class="itit"><i class="fas fa-chart-bar"></i> Dashboard</h1>
  </div>

  <div class="dash-grid">
    <div class="dash-card">
      <div class="dash-card-label"><i class="fas fa-compact-disc"></i> Total de juegos en catálogo</div>
      <div class="dash-total" id="dash-total-games">—</div>
    </div>
    <div class="dash-card">
      <div class="dash-card-label"><i class="fas fa-gamepad"></i> Juegos por consola</div>
      <div id="dash-by-console" style="margin-top:6px"></div>
    </div>
    <div class="dash-card">
      <div class="dash-card-label"><i class="fas fa-clock"></i> Últimos juegos agregados</div>
      <div id="dash-recent" style="margin-top:6px"></div>
    </div>
  </div>
</div>

<!-- Login Modal -->
<div class="ov" id="m-login">
  <div class="mo">
    <button class="mcl" onclick="cMod('m-login')"><i class="fas fa-times"></i></button>
    <div class="mic cy"><i class="fas fa-crown"></i></div>
    <h2 class="mtit">Acceso Admin</h2><p class="msub">Ingresa tus credenciales.</p>
    <div class="fi"><label>Usuario</label><input type="text" id="lu" placeholder="admin" autocomplete="off"/></div>
    <div class="fi"><label>Contraseña</label><input type="password" id="lp" placeholder="••••••••"/></div>
    <button class="bp cy" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> Entrar</button>
    <div class="merr" id="lerr"><i class="fas fa-exclamation-circle"></i> Usuario o contraseña incorrectos.</div>
  </div>
</div>

<footer><span>Evolution Games B&amp;R</span> &nbsp;·&nbsp; Dashboard &nbsp;·&nbsp; 2026</footer>

<div class="fab-stack">
  <a href="puesto.html" class="fab-btn home" title="Menú Puesto"><i class="fas fa-tools"></i></a>
</div>

<script src="../data/games.js"></script>
<script type="module" src="../js/app.js"></script>
</body>
</html>
