<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<canvas id="pts"></canvas>
<div class="gbg"></div>

<nav>
  <div class="nlogo"><i class="fas fa-gamepad"></i><span>Evolution Games B&amp;R</span></div>
  <div class="nr">
    <span class="badm"><i class="fas fa-crown"></i> Admin</span>
    <button class="nbtn" id="btn-login-nav" onclick="oMod('m-login')"><i class="fas fa-crown"></i> Admin</button>
    <button class="nbtn dn" id="btn-logout"><i class="fas fa-sign-out-alt"></i> Salir</button>
  </div>
</nav>
<div id="toast"><i class="fas fa-check-circle"></i><span id="tmsg"></span></div>

<div class="ip">
  <div class="ihdr">
    <div class="bc">
      <a href="../index.html" class="bcl" style="text-decoration:none"><i class="fas fa-home"></i> Inicio</a>
      <i class="fas fa-chevron-right" style="font-size:.52rem"></i>
      <a href="puesto.html" class="bcl" style="text-decoration:none">Puesto</a>
      <i class="fas fa-chevron-right" style="font-size:.52rem"></i>
      <span>Flasheo</span>
    </div>
    <h1 class="itit"><i class="fas fa-book-open"></i> Guías de Flasheo</h1>
  </div>
  <div class="fgrid" id="flasgrid"></div>
  <button class="fab" onclick="openAddGuide()"><i class="fas fa-plus"></i> Agregar Guía</button>
</div>

<!-- Login -->
<div class="ov" id="m-login">
  <div class="mo">
    <button class="mcl" onclick="cMod('m-login')"><i class="fas fa-times"></i></button>
    <div class="mic cy"><i class="fas fa-crown"></i></div>
    <h2 class="mtit">Acceso Admin</h2><p class="msub">Ingresa tus credenciales.</p>
    <div class="fi"><label>Usuario</label><input type="text" id="lu" placeholder="admin" autocomplete="off"/></div>
    <div class="fi"><label>Contraseña</label><input type="password" id="lp" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="bp cy" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> Entrar</button>
    <div class="merr" id="lerr"><i class="fas fa-exclamation-circle"></i> Usuario o contraseña incorrectos.</div>
  </div>
</div>

<!-- Flash Steps -->
<div class="ov" id="m-fl">
  <div class="mo w">
    <button class="mcl" onclick="cMod('m-fl')"><i class="fas fa-times"></i></button>
    <div class="mic pk"><i class="fas fa-book-open"></i></div>
    <h2 class="mtit" id="fl-tit">Guía</h2><p class="msub" id="fl-sub"></p>
    <div class="stl" id="fl-steps"></div>
  </div>
</div>

<!-- Add/Edit Guide -->
<div class="ov" id="m-ga">
  <div class="mo w">
    <button class="mcl" onclick="cMod('m-ga')"><i class="fas fa-times"></i></button>
    <div class="mic pk"><i id="ga-ico" class="fas fa-plus"></i></div>
    <h2 class="mtit" id="ga-tit">Agregar Guía</h2><p class="msub">Tutorial paso a paso de flasheo/chipeo.</p>
    <div class="fi"><label>Consola</label>
      <select id="ga-con"><option>PS4</option><option>PS5</option><option>PS3</option><option>PS2</option><option>PSVita</option><option>PSP</option><option>Switch</option><option>Wii</option><option>Xbox360</option></select>
    </div>
    <div class="fi"><label>Título</label><input type="text" id="ga-title" placeholder="Ej: Flasheo PS4 — v9.00 a 11.00"/></div>
    <div class="fi"><label>Descripción corta</label><input type="text" id="ga-desc" placeholder="Ej: HEN vía exploit web"/></div>
    <div class="fi"><label>Pasos (uno por línea)</label>
      <textarea id="ga-steps" placeholder="Verifica la versión...&#10;Ve a Configuración → Red...&#10;Elige Wi-Fi o LAN..." style="min-height:140px"></textarea>
    </div>
    <button class="bp pu" onclick="saveGuide()"><i class="fas fa-save"></i> Guardar Guía</button>
  </div>
</div>

<footer><span>Evolution Games B&amp;R</span> &nbsp;·&nbsp; Sistema de Gestión &nbsp;·&nbsp; 2026</footer>

<!-- FABs -->
<div class="fab-stack">

  <a href="puesto.html" class="fab-btn home" title="Menú Puesto"><i class="fas fa-tools"></i></a>
</div>

<script src="../data/games.js"></script>
<script type="module" src="../js/app.js"></script>

rFlash();
</script>
</body>
</html>
