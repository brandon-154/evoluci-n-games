<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Catálogo — Evolución Games B&R</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<canvas id="pts"></canvas>
<div class="gbg"></div>

<nav>
  <div class="nlogo"><i class="fas fa-gamepad"></i><span>Evolución Games B&amp;R</span></div>
  <div class="nr">
    <a href="cliente.html" class="nbtn"><i class="fas fa-arrow-left"></i> Consolas</a>
  </div>
</nav>
<div id="toast"><i class="fas fa-check-circle"></i><span id="tmsg"></span></div>

<div class="ip">
  <div class="ihdr">
    <div class="bc">
      <a href="cliente.html" class="bcl" style="text-decoration:none"><i class="fas fa-gamepad"></i> Consolas</a>
      <i class="fas fa-chevron-right" style="font-size:.52rem"></i>
      <span id="client-con-title">PS4</span>
    </div>
    <h1 class="itit"><i class="fas fa-search"></i> Catálogo de Juegos</h1>
  </div>
  <div class="swrap">
    <div class="srow">
      <div class="sbox"><i class="fas fa-search"></i><input type="text" id="sinp" placeholder="Busca un juego..." oninput="renderClientGames()"/></div>
    </div>
  </div>
  <div class="cattabs" id="client-genre-tabs"></div>
  <div class="ggrid" id="client-ggrid"></div>
</div>

<!-- Cart FAB -->
<button class="cart-fab" onclick="openCart()">
  <i class="fas fa-shopping-cart"></i>
  <span>Mi Lista</span>
  <span class="cart-badge" id="cart-badge">0</span>
</button>

<!-- Cart Modal -->
<div class="ov" id="m-cart">
  <div class="mo">
    <button class="mcl" onclick="cMod('m-cart')"><i class="fas fa-times"></i></button>
    <div class="mic cy"><i class="fas fa-shopping-cart"></i></div>
    <h2 class="mtit">Mi Lista de Juegos</h2>
    <p class="msub">Revisa tu selección antes de enviarla.</p>
    <div class="cart-list" id="cart-list"></div>
    <button class="bp cy" onclick="sendCartToWhatsApp('principal')"><i class="fab fa-whatsapp"></i> Enviar lista por WhatsApp</button>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="sbtn dl" style="flex:1;justify-content:center" onclick="clearCart()"><i class="fas fa-trash"></i> Vaciar lista</button>
    </div>
    <div class="wa-config-note">
      <i class="fas fa-info-circle"></i>
      <span>Tu lista se enviará por WhatsApp para que el administrador la revise y te confirme en qué disco está cada juego.</span>
    </div>
  </div>
</div>

<footer><span>Evolución Games B&amp;R</span> &nbsp;·&nbsp; Catálogo para Clientes &nbsp;·&nbsp; 2026</footer>

<script src="../data/games.js"></script>
<script src="../js/app.js"></script>
<script>
renderClientGames();
updateCartBadge();
</script>
</body>
</html>
